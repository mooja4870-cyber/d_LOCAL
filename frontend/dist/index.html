  <script>
    (function applyInitialTheme() {
      var storageKey = 'theme-preference';
      var dark = 'dark-1';
      var light = 'light-1';
      var allowedThemes = {
        'dark-1': true,
        'dark-2': true,
        'dark-3': true,
        'light-1': true,
        'light-2': true,
        'light-3': true
      };
      var theme = dark;

      try {
        var storedTheme = localStorage.getItem(storageKey);
        if (storedTheme && allowedThemes[storedTheme]) {
          theme = storedTheme;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = dark;
        } else {
          theme = light;
        }
      } catch (_error) {
        if (window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = light;
        }
      }

	      var mode = theme.indexOf('dark-') === 0 ? 'dark' : 'light';
	      var variant = theme.split('-')[1] || '1';
	      document.documentElement.setAttribute('data-theme', theme);
	      document.documentElement.setAttribute('data-theme-mode', mode);
	      document.documentElement.setAttribute('data-theme-variant', variant);
	      document.documentElement.style.colorScheme = mode;

	      var colorSchemeMeta = document.getElementById('color-scheme');
	      if (colorSchemeMeta) {
	        // Hint the UA that we're explicitly in light/dark, which reduces "forced dark" heuristics in Chrome.
	        colorSchemeMeta.setAttribute('content', mode);
	      }

	      var themeColorMeta = document.getElementById('theme-color');
	      if (themeColorMeta) {
	        themeColorMeta.setAttribute('content', mode === 'dark' ? '#0b1220' : '#f8fafc');
	      }
	    })();
